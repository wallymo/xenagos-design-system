            - text: 01 — One accent
            - heading "Blue is the only accent." [level=3] [ref=e53]
            - paragraph [ref=e54]: Every interactive element, highlight, and second headline line uses the blue ramp. No teal, no green, no secondary palette. Restraint is the brand.
          - generic [ref=e55]:
            - text: 02 — Light / dark rhythm
            - heading "Sections alternate, full-bleed." [level=3] [ref=e56]
            - paragraph [ref=e57]: Pages breathe between white/gray-50 bands and navy bands. Dark bands carry the molecular imagery; light bands carry density and detail.
          - generic [ref=e58]:
            - text: 03 — Two-tone headlines
            - heading "Line one ink, line two blue." [level=3] [ref=e59]
            - paragraph [ref=e60]: The signature typographic move, finished with a 48×2px accent rule. Light weight at large sizes — never bold display type.
          - generic [ref=e61]:
            - text: 04 — Motion is atmosphere
            - heading "Nothing flashy, ever." [level=3] [ref=e62]
            - paragraph [ref=e63]: Fades, soft parallax, progressive reveals, slow helix drift. Motion reinforces sophistication without drawing attention to itself. Honor reduced-motion.
        - generic [ref=e64]:
          - text: 05 — Components, not pages
          - paragraph [ref=e65]:
            - text: Every element here ships as a reusable component with content passed via props. Pages are compositions. If a layout can't be expressed by the components on this page, the system grows first — the page doesn't go one-off.
